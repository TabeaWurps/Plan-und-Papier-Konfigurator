<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planungshilfen-Konfigurator v18.5 (Schrift auf den Linien)</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-image: url('3a.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: #4a4540;
            display: flex;
            min-height: 100vh;
            transition: background-image 0.3s ease;
        }
        
        /* Sidebar Layout */
        .config-sidebar {
            width: 480px;
            background-color: #ffffff;
            box-shadow: 2px 0 15px rgba(0,0,0,0.05);
            padding: 25px 20px;
            overflow-y: auto;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 100;
        }
        .config-sidebar h2 {
            font-size: 20px;
            color: #8c8275;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid #f4f1ea;
            padding-bottom: 10px;
        }
        
        /* Speicher-Zone */
        .storage-zone {
            background: #f0f4f8;
            border: 1px solid #d0e0f0;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .storage-buttons-row {
            display: flex;
            gap: 10px;
        }
        .btn-storage-save {
            flex: 1;
            background-color: #4a7c59;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .btn-storage-save:hover { background-color: #385e43; }
        
        .btn-storage-load {
            flex: 1;
            background-color: #68809a;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .btn-storage-load:hover { background-color: #4f6378; }

        .reset-zone-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            margin-bottom: 8px;
        }
        .btn-reset-form {
            background-color: #f2dede;
            color: #a94442;
            border: 1px solid #ebccd1;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-reset-form:hover { 
            background-color: #ebcccc; 
            color: #843534;
        }

        .file-input-hidden {
            display: none;
        }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #5c544c;
            background: #f4f1ea;
            padding: 6px 10px;
            border-radius: 4px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #706960;
        }
        input[type="text"], input[type="date"], input[type="number"], select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            color: #4a4540;
            background-color: #fafafa;
        }
        
        /* Dynamic Subject Matrix Cards */
        .subject-card {
            background-color: #fbfbfa;
            border: 1px solid #e6e2da;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 15px;
            position: relative;
        }
        .subject-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 5px;
        }
        
        .sort-buttons-group {
            display: flex;
            gap: 2px;
        }
        .btn-sort-arrow {
            background: #eae5db;
            color: #5c544c;
            border: 1px solid #dcd7cd;
            border-radius: 4px;
            padding: 4px 6px;
            font-size: 11px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-sort-arrow:hover { background: #bcaf9e; color: white; }

        .btn-remove-subject {
            background: #e0acac;
            color: #722222;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-remove-subject:hover { background: #d09696; }
        .btn-add-subject {
            display: inline-block;
            background-color: #bcaf9e;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
            margin-bottom: 15px;
        }
        .btn-add-subject:hover { background-color: #a39684; }
        
        .btn-add-row {
            background-color: #f4f1ea;
            color: #706960;
            border: 1px solid #dcd7cd;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
            font-weight: bold;
        }
        .btn-add-row:hover { background-color: #eae5db; }

        .einheiten-table {
            width: 100%;
            border-collapse: collapse;
        }
        .einheiten-table th, .einheiten-table td {
            padding: 5px;
            font-size: 12px;
            border: 1px solid #e1ded8;
        }
        .einheiten-table th {
            background-color: #f4f1ea;
            color: #706960;
        }
        .einheiten-table input {
            width: 100%;
            border: none;
            background: transparent;
            padding: 4px;
            font-size: 12px;
        }
        
        .day-config {
            background-color: #faf9f6;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #f0ede6;
        }
        .day-title {
            font-weight: bold;
            font-size: 14px;
            color: #8c8275;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            border-bottom: 1px solid #e6e2da;
            padding-bottom: 4px;
        }
        .stunden-liste {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .stunde-input-group {
            background: #fff;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #eae6df;
        }
        .stunde-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .stunde-label {
            font-size: 12px;
            font-weight: bold;
            color: #a0988e;
        }
        .row-select-container {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #706960;
        }
        .zeilen-select {
            width: 50px;
            padding: 2px 4px;
            font-size: 11px;
        }

        .btn-print {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #8c8275;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            text-align: center;
            text-decoration: none;
        }
        .btn-print:hover { background-color: #70675c; }

        /* Preview Area Container */
        .preview-container {
            margin-left: 480px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            padding: 40px;
            overflow-y: auto;
            margin-top: 50px;
        }
        
        .week-bundle-separator {
            border: 2px dashed #b0a69a;
            width: 100%;
            max-width: 794px;
            margin: 10px 0;
            text-align: center;
            position: relative;
        }
        .week-bundle-separator::after {
            content: "NÄCHSTE PLANUNGSWOCHE";
            background: #f2ede4;
            padding: 0 10px;
            font-size: 12px;
            font-weight: bold;
            color: #8c8275;
            position: relative;
            top: -10px;
        }

        .appendix-separator {
            border: 3px double #8c8275;
            width: 100%;
            max-width: 794px;
            margin: 20px 0;
            text-align: center;
            position: relative;
        }
        .appendix-separator::after {
            content: "ANHANG: EINHEITSPLANUNG";
            background: #f2ede4;
            padding: 0 15px;
            font-size: 13px;
            font-weight: bold;
            color: #5c544c;
            letter-spacing: 1px;
            position: relative;
            top: -11px;
        }
        
        /* EXACT A4 REPRESENTATION */
        .a4-page {
            width: 794px;
            height: 1123px;
            background-color: #ffffff;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.08);
            position: relative;
            box-sizing: border-box;
            padding: 55px 50px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        /* Appendix design styling */
        .appendix-title-box {
            margin-top: 50px;
            margin-bottom: 30px;
            border-bottom: 2px solid #8c8275;
            padding-bottom: 10px;
        }
        .appendix-title-box h1 {
            font-size: 22px;
            color: #5c544c;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .master-plan-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .master-plan-table th, .master-plan-table td {
            border: 1px solid #dcd7cd;
            padding: 10px 12px;
            font-size: 13px;
            text-align: left;
            vertical-align: top;
        }
        .master-plan-table th {
            background-color: #f4f1ea;
            color: #4a4540;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }
        .master-plan-table tr:nth-child(even) { background-color: #faf9f6; }
        .master-plan-table .week-cell {
            font-weight: bold;
            color: #8c8275;
            width: 15%;
            white-space: nowrap;
        }
        .master-plan-table .subject-tag {
            display: inline-block;
            font-weight: bold;
            font-size: 11px;
            color: #8c8275;
            text-transform: uppercase;
            margin-bottom: 3px;
            border-bottom: 1px solid #bcaf9e;
        }

        /* Header Style */
        .header-section {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-top: 40px;
            margin-bottom: 45px;
            height: 110px;
        }
        
        .date-container-box { margin-top: 50px; }
        .date-display {
            font-size: 16px;
            letter-spacing: 3px;
            color: #8c8275;
            font-weight: bold;
            padding-left: 5px;
        }
        
        .wichtig-box-content-only {
            width: 250px;
            margin-top: -4px; 
            margin-left: 38px; 
            padding: 10px 5px;
        }

        /* Schedule Layout */
        .schedule-grid {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 25px; 
            margin-top: 15px;
        }
        
        .page-2-spacer { height: 120px; }
        
        /* Day Rows */
        .day-row {
            display: flex;
            align-items: stretch;
            border-bottom: 2px solid rgba(230, 223, 213, 0.7);
            padding-bottom: 15px;
            position: relative;
        }
        .day-row.is-holiday-day {
            background-color: rgba(242, 222, 222, 0.4);
            border-radius: 6px;
            padding: 10px;
        }
        .day-row:last-child { border-bottom: none; }
        
        .lessons-column {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 14px; 
        }
        
        .subject-container {
            display: flex;
            flex-direction: column;
            gap: 4px; 
        }

        /* BASIS-LINIE: Ausrichtung optimiert, damit Text auf der Linie aufsitzt */
        .lesson-line {
            display: flex;
            align-items: flex-end;
            height: 26px;
            position: relative;
            border-bottom: 1px dotted #b0a89f; /* Grundlinie für Folgezeilen */
        }
        .lesson-num {
            width: 25px;
            font-size: 14px;
            font-weight: bold;
            color: #a3998e;
            display: flex;
            align-items: flex-end;
            padding-bottom: 1px;
            align-self: stretch;
        }
        
        /* KOMBINIERTE ZEILE 1 (Fachname + Eingabefeld dahinter) */
        .lesson-line-row1 {
            display: flex;
            align-items: flex-end;
            width: 100%;
            padding-bottom: 1px; /* Senkt den Text leicht ab */
        }
        .lesson-line.has-combined-row {
            border-bottom: 1px dotted #b0a89f; /* Überschreibt oder sichert die gepunktete Linie */
        }
        .lesson-static-text-inline {
            font-size: 16px;
            color: #4a4540;
            padding-left: 8px;
            font-weight: normal;
            white-space: nowrap;
            margin-right: 8px;
            line-height: 1;
            padding-bottom: 1px;
        }

        /* BESCHREIBBARE LINIEN (Browser-Modus) */
        .lesson-editable-input {
            flex-grow: 1;
            border: 1px dashed rgba(140, 130, 117, 0.25);
            border-radius: 4px;
            background: rgba(253, 250, 244, 0.4);
            font-size: 16px;
            color: #4a4540;
            padding-left: 8px;
            padding-bottom: 1px; /* Senkt die Texteingabe ab */
            font-family: inherit;
            height: 23px;
            line-height: 1;
        }
        .lesson-editable-input:focus {
            outline: none;
            border: 1px solid #8c8275;
            background-color: #ffffff;
        }
        
        .lesson-topic-subtitle {
            font-size: 11px;
            font-style: italic;
            color: #8c7e6e;
            margin-top: 2px;
            padding-left: 33px;
            line-height: 1.2;
        }
        
        .day-label-column {
            width: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            writing-mode: vertical-rl;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 4px;
            font-weight: bold;
            color: #8c8275;
            border-left: 1px solid rgba(235, 217, 200, 0.8);
            margin-left: 20px;
            padding-right: 5px;
        }

        .day-holiday-badge {
            font-size: 12px;
            font-weight: bold;
            color: #a94442;
            background: #f2dede;
            border: 1px solid #ebccd1;
            padding: 3px 8px;
            border-radius: 4px;
            margin-bottom: 6px;
            display: inline-block;
        }

        /* DRUCK-ANPASSUNGEN */
        @media print {
            body {
                background-color: #ffffff;
                background-image: none !important;
                display: block;
            }
            #design-switcher, .config-sidebar, .week-bundle-separator, .appendix-separator {
                display: none !important;
            }
            .day-row.is-holiday-day {
                background-color: #fafafa !important;
                border: 1px dashed #ccc !important;
            }
            .preview-container {
                margin-left: 0 !important;
                padding: 0 !important;
                gap: 0 !important;
                margin-top: 0 !important;
            }
            .a4-page {
                box-shadow: none !important;
                width: 794px !important; 
                height: 1123px !important;
                page-break-after: always !important;
                margin-bottom: 0 !important;
            }
            
            /* KÄSTCHENRÄNDER BEIM DRUCKEN ENTFERNEN */
            .lesson-editable-input {
                border: none !important;
                border-radius: 0 !important;
                background: transparent !important;
                display: inline-block !important;
                color: #000000 !important;
                padding-left: 4px !important;
                padding-bottom: 0px !important;
                height: auto !important;
                line-height: 1 !important;
            }

            .lesson-line {
                border-bottom: 1px dotted #b0a89f !important;
            }
            
            @page {
                size: A4 portrait;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div id="design-switcher" style="position: fixed; top: 0; left: 480px; right: 0; background: rgba(255, 255, 255, 0.95); padding: 12px; text-align: center; border-bottom: 1px solid #e6e2da; font-family: sans-serif; z-index: 999; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
        <span style="margin-right: 15px; font-weight: bold; color: #5c544c; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px;">Vorschau-Hintergrund wählen:</span>
        <button onclick="changeBackground('3a.jpg', '3b.jpg')" style="margin: 0 5px; padding: 6px 12px; cursor: pointer; border: 1px solid #bcaf9e; background: #fff; color: #4a4540; border-radius: 4px; font-weight: bold; font-size: 12px;">Jahreszeiten</button>
        <button onclick="changeBackground('1a.jpg', '1b.jpg')" style="margin: 0 5px; padding: 6px 12px; cursor: pointer; border: 1px solid #bcaf9e; background: #fff; color: #4a4540; border-radius: 4px; font-weight: bold; font-size: 12px;">Aquarell</button>
        <button onclick="changeBackground('2a.jpg', '2b.jpg')" style="margin: 0 5px; padding: 6px 12px; cursor: pointer; border: 1px solid #bcaf9e; background: #fff; color: #4a4540; border-radius: 4px; font-weight: bold; font-size: 12px;">Eukalyptus</button>
        <button onclick="changeBackground('4a.jpg', '4b.jpg')" style="margin: 0 5px; padding: 6px 12px; cursor: pointer; border: 1px solid #bcaf9e; background: #fff; color: #4a4540; border-radius: 4px; font-weight: bold; font-size: 12px;">Ohne Hintergrund</button>
    </div>

    <div class="config-sidebar">
        <h2>Planungshilfen-Konfigurator</h2>
        
        <div class="storage-zone">
            <div class="storage-buttons-row">
                <button class="btn-storage-save" onclick="exportPlanAsFile()">💾 Auf PC speichern</button>
                <button class="btn-storage-load" onclick="triggerFileImport()">📂 Datei laden</button>
            </div>
            <input type="file" id="fileImportInput" class="file-input-hidden" accept=".json" onchange="importPlanFromFile(event)">
        </div>
        
        <div style="background: #eef7f2; padding: 14px; border: 1px solid #bce0cb; border-radius: 6px; margin-bottom: 15px; margin-top: 15px;">
            <label for="stateSelect" style="color: #2e613f; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;">🌍 Bundesland für Feiertage wählen (2026):</label>
            <select id="stateSelect" onchange="updatePreview()" style="border-color: #bce0cb; background-color: #fff; font-weight: bold;">
                <option value="NI" selected>Niedersachsen</option>
                <option value="BW">Baden-Württemberg</option>
                <option value="BY">Bayern</option>
                <option value="BE">Berlin</option>
                <option value="BB">Brandenburg</option>
                <option value="HB">Bremen</option>
                <option value="HH">Hamburg</option>
                <option value="HE">Hessen</option>
                <option value="MV">Mecklenburg-Vorpommern</option>
                <option value="NW">Nordrhein-Westfalen</option>
                <option value="RP">Rheinland-Pfalz</option>
                <option value="SL">Saarland</option>
                <option value="SN">Sachsen</option>
                <option value="ST">Sachsen-Anhalt</option>
                <option value="SH">Schleswig-Holstein</option>
                <option value="TH">Thüringen</option>
            </select>
        </div>

        <div style="background: #fdfaf4; padding: 12px; border: 1px dashed #bcaf9e; border-radius: 6px; margin-bottom: 15px;">
            <div class="form-group">
                <label for="startDate">Start-Montag auswählen:</label>
                <input type="date" id="startDate" onchange="updatePreview()">
            </div>
            
            <div class="form-group">
                <label for="weekCount">Wie viele Wochen drucken?</label>
                <input type="number" id="weekCount" value="6" min="1" max="24" oninput="updatePreview()">
            </div>
        </div>

        <div class="section-title"> Basis-Stundenplan</div>

        <div id="daysFormContainer"></div>

        <div class="reset-zone-header">
            <div class="section-title no-margin">Einheitsplanung</div>
            <button class="btn-reset-form" onclick="resetThematicPlan()">❌ Reihe leeren</button>
        </div>
        
        <div id="subjectsContainer"></div>
        
        <button class="btn-add-subject" onclick="addNewSubjectCard()">+ Weiteres Fach hinzufügen</button>
        
        <div style="border-top: 2px solid #f4f1ea; margin-top: 200px; padding-top: 5px;">
            <button class="btn-print" onclick="window.print()">Planungshilfe drucken (PDF)</button>
        </div>
    </div>

    <div class="preview-container" id="pagesPreviewArea"></div>

    <script>
        const days = ["Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag"];
        
        let manualLineOverrides = {};

        const HOLIDAY_DATABASE_2026 = {
            "ALL": [
                { name: "Neujahr", date: "2026-01-01" },
                { name: "Karfreitag", date: "2026-04-03" },
                { name: "Ostermontag", date: "2026-04-06" },
                { name: "Tag der Arbeit", date: "2026-05-01" },
                { name: "Christi Himmelfahrt", date: "2026-05-14" },
                { name: "Pfingstmontag", date: "2026-05-25" },
                { name: "Tag der Deutschen Einheit", date: "2026-10-03" },
                { name: "1. Weihnachtstag", date: "2026-12-25" },
                { name: "2. Weihnachtstag", date: "2026-12-26" }
            ],
            "NI": [
                { name: "Brückentag (Himmelfahrt)", date: "2026-05-15" },
                { name: "Pfingstferien (Ferientag)", date: "2026-05-26" },
                { name: "Reformationstag", date: "2026-10-31" },
                ...generateDateRange("2026-07-02", "2026-08-12", "Sommerferien")
            ],
            "NW": [
                { name: "Fronleichnam", date: "2026-06-04" },
                { name: "Allerheiligen", date: "2026-11-01" },
                { name: "Pfingstferien (Ferientag)", date: "2026-05-26" },
                ...generateDateRange("2026-07-20", "2026-09-01", "Sommerferien")

        function generateDateRange(startStr, endStr, name) {
            let arr = [];
            let current = new Date(startStr);
            let end = new Date(endStr);
            while (current <= end) {
                let yyyy = current.getFullYear();
                let mm = String(current.getMonth() + 1).padStart(2, '0');
                let dd = String(current.getDate()).padStart(2, '0');
                arr.push({ name: name, date: `${yyyy}-${mm}-${dd}` });
                current.setDate(current.getDate() + 1);
            }
            return arr;
        }

        function getHolidayNameForDay(dateObj) {
            let yyyy = dateObj.getFullYear();
            let mm = String(dateObj.getMonth() + 1).padStart(2, '0');
            let dd = String(dateObj.getDate()).padStart(2, '0');
            let dateString = `${yyyy}-${mm}-${dd}`;

            let globalMatch = HOLIDAY_DATABASE_2026["ALL"].find(h => h.date === dateString);
            if (globalMatch) return globalMatch.name;

            let selectedState = document.getElementById('stateSelect').value;
            if (HOLIDAY_DATABASE_2026[selectedState]) {
                let stateMatch = HOLIDAY_DATABASE_2026[selectedState].find(h => h.date === dateString);
                if (stateMatch) return stateMatch.name;
            }
            return null;
        }

        function moveSubject(button, direction) {
            let card = button.closest('.subject-card');
            if (!card) return;

                if (prev) card.parentNode.insertBefore(card, prev);
            } else if (direction === 'down') {
                let next = card.nextElementSibling;
                if (next) card.parentNode.insertBefore(card, next);

        function calculateWeekRangeStr(baseMondayDate, weeksOffset) {
            let targetMonday = new Date(baseMondayDate.getTime());
            targetMonday.setDate(targetMonday.getDate() + (weeksOffset * 7));
            
            let targetFreitag = new Date(targetMonday.getTime());
            targetFreitag.setDate(targetFreitag.getDate() + 4);
            
            let pad = (num) => String(num).padStart(2, '0');
            return `${pad(targetMonday.getDate())}.${pad(targetMonday.getMonth() + 1)} - ${pad(targetFreitag.getDate())}.${pad(targetFreitag.getMonth() + 1)}`;
        }

            for(let w = 0; w < totalWeeks; w++) {

                let currentMonday = new Date(baseMondayDate.getTime());

                timetable: {},

                        lines: document.getElementById(`lines-${day}-${i}`).value

                }
            });

            let cards = document.querySelectorAll('.subject-card');
            cards.forEach(card => {
                let sName = card.querySelector('.subject-name-input').value;
                let topics = [];

                inputs.forEach(inp => { topics.push(inp.value); });
                planData.subjects.push({ name: sName, topics: topics });

            let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(planData, null, 2));
            let downloadAnchor = document.createElement('a');
            let fileDate = planData.startDate || "planung";
            
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `Wochenplan_${fileDate}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function triggerFileImport() {
            document.getElementById('fileImportInput').click();
        }

        function importPlanFromFile(event) {
            let file = event.target.files[0];
            if (!file) return;

            let reader = new FileReader();
            reader.onload = function(e) {
                try {
                    let planData = JSON.parse(e.target.result);
                    
                    document.getElementById('startDate').value = planData.startDate || "";
                    document.getElementById('weekCount').value = planData.weekCount || "6";
                    if(planData.selectedState) document.getElementById('stateSelect').value = planData.selectedState;
                    if(planData.manualLineOverrides) manualLineOverrides = planData.manualLineOverrides;

                    days.forEach(day => {
                        if(planData.timetable && planData.timetable[day]) {
                            for(let i = 1; i <= 6; i++) {
                                let cellData = planData.timetable[day][i-1];
                                if(cellData) {
                                    document.getElementById(`input-${day}-${i}`).value = cellData.val;
                                    document.getElementById(`lines-${day}-${i}`).value = cellData.lines;
                                }
                            }
                        }
                    });

                    document.getElementById('subjectsContainer').innerHTML = '';
                    if(planData.subjects && planData.subjects.length > 0) {
                        planData.subjects.forEach(sub => {
                            addNewSubjectCard(sub.name, sub.topics);
                        });
                    }

                    updatePreview();
                    alert("📂 Planung erfolgreich geladen!");
                } catch (err) {
                    alert("Fehler beim Lesen der Datei.");
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function resetThematicPlan() {
            if(confirm("Möchtest du alle eingetragenen Fächer und Themenreihen wirklich löschen? Dein Basis-Stundenplan oben bleibt komplett erhalten!")) {
                document.getElementById('subjectsContainer').innerHTML = '';
                manualLineOverrides = {};
                updatePreview();
            }
        }

        setInitialMonday();
        preloadedSubjects.forEach(sub => {
            addNewSubjectCard(sub.name, sub.topics);
        });
    </script>
</body>
</html>
