<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planungshilfen-Konfigurator v18.1 (Geschützte Hauptzeilen)</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-image: url('3a.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: #4a4540;
            display: flex;
            min-height: 100vh;
            transition: background-image 0.3s ease;
        }
        
        /* Sidebar Layout (Links fest verankert) */
        .config-sidebar {
            width: 480px;
            background-color: #ffffff;
            box-shadow: 2px 0 15px rgba(0,0,0,0.05);
            padding: 25px 20px;
            overflow-y: auto;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 100;
        }
        .config-sidebar h2 {
            font-size: 20px;
            color: #8c8275;
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 2px solid #f4f1ea;
            padding-bottom: 10px;
        }
        
        /* Speicher-Zone */
        .storage-zone {
            background: #f0f4f8;
            border: 1px solid #d0e0f0;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .storage-buttons-row {
            display: flex;
            gap: 10px;
        }
        .btn-storage-save {
            flex: 1;
            background-color: #4a7c59;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .btn-storage-save:hover { background-color: #385e43; }
        
        .btn-storage-load {
            flex: 1;
            background-color: #68809a;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .btn-storage-load:hover { background-color: #4f6378; }

        /* Reset-Button */
        .reset-zone-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            margin-bottom: 8px;
        }
        .btn-reset-form {
            background-color: #f2dede;
            color: #a94442;
            border: 1px solid #ebccd1;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-reset-form:hover { 
            background-color: #ebcccc; 
            color: #843534;
        }

        .file-input-hidden {
            display: none;
        }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #5c544c;
            background: #f4f1ea;
            padding: 6px 10px;
            border-radius: 4px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .section-title.no-margin {
            margin: 0;
            flex-grow: 1;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #706960;
        }
        input[type="text"], input[type="date"], input[type="number"], textarea, select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            color: #4a4540;
            background-color: #fafafa;
        }
        input[type="text"]:focus, input[type="date"]:focus, input[type="number"]:focus, textarea:focus, select:focus {
            border-color: #bcaf9e;
            outline: none;
            background-color: #fff;
        }
        
        /* Dynamic Subject Matrix Cards */
        .subject-card {
            background-color: #fbfbfa;
            border: 1px solid #e6e2da;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 15px;
            position: relative;
        }
        .subject-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            gap: 5px;
        }
        
        .sort-buttons-group {
            display: flex;
            gap: 2px;
        }
        .btn-sort-arrow {
            background: #eae5db;
            color: #5c544c;
            border: 1px solid #dcd7cd;
            border-radius: 4px;
            padding: 4px 6px;
            font-size: 11px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-sort-arrow:hover { background: #bcaf9e; color: white; }

        .btn-remove-subject {
            background: #e0acac;
            color: #722222;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-remove-subject:hover { background: #d09696; }
        .btn-add-subject {
            display: inline-block;
            background-color: #bcaf9e;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
            margin-bottom: 15px;
        }
        .btn-add-subject:hover { background-color: #a39684; }
        
        .btn-add-row {
            background-color: #f4f1ea;
            color: #706960;
            border: 1px solid #dcd7cd;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
            font-weight: bold;
        }
        .btn-add-row:hover { background-color: #eae5db; }

        .einheiten-table {
            width: 100%;
            border-collapse: collapse;
        }
        .einheiten-table th, .einheiten-table td {
            padding: 5px;
            font-size: 12px;
            border: 1px solid #e1ded8;
        }
        .einheiten-table th {
            background-color: #f4f1ea;
            color: #706960;
            text-align: left;
        }
        .einheiten-table input {
            width: 100%;
            border: none;
            background: transparent;
            padding: 4px;
            font-size: 12px;
        }
        .einheiten-table input:focus {
            outline: 1px solid #bcaf9e;
            background: #fff;
        }
        
        .day-config {
            background-color: #faf9f6;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #f0ede6;
        }
